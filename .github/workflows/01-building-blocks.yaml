name: 01 - Building blocks

on: push

jobs:
    echo-hello:
        runs-on: ubuntu-latest
        steps:
            - name: Say Hello
              run: echo "Hello World"

    echo-goodbye:
        runs-on: ubuntu-latest
        steps:
            - name: Failed step
              run: |
                echo "I will Fail"
                exit 1

            - name: Say Goodbye
              run: echo "Good Bye!!!"

    
